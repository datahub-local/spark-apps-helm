helmDefaults:
  wait: true
  timeout: 900

repositories:
  - name: spark-operator
    url: https://kubeflow.github.io/spark-operator

releases:
  - name: spark-operator
    namespace: spark-operator
    createNamespace: true
    chart: spark-operator/spark-operator
    version: 2.5.0
    values:
      - spark:
          jobNamespaces:
            - spark-apps
