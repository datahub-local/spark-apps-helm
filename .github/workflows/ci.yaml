name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Fetch cached dependencies charts
        id: cache-charts
        uses: actions/cache/restore@v4
        with:
          path: spark-apps/charts
          key: dep-charts-v2-${{ hashFiles('spark-apps/Chart.yaml') }}

      - name: Run chart-testing (lint)
        env:
          CACHE_HIT: ${{ steps.cache-charts.outputs.cache-hit == 'true' }}
        run: devbox run lint

      - name: Save dependencies charts in the cache
        if: ${{ steps.cache-charts.outputs.cache-hit != 'true' }}
        id: cache-charts-save
        uses: actions/cache/save@v4
        with:
          path: spark-apps/charts
          key: dep-charts-v2-${{ hashFiles('spark-apps/Chart.yaml') }}

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Run Unit Tests
        run: devbox run test-unit

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@v0.14.0

      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Helm Dependency build
        run: devbox run init-charts

      - name: Start cluster and deploy dependencies
        run: devbox run start-k8s

      - name: Deploy test chart
        run: devbox run test-install
        continue-on-error: true

      - name: Run test verification
        run: devbox run test-check

      # - name: Setup upterm session
      #   uses: owenthereal/action-upterm@v1
      #   if: ${{ failure() }}
      #   with:
      #     limit-access-to-actor: true
      #     wait-timeout-minutes: 5

  build:
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Fetch cached dependencies charts
        id: cache-charts
        uses: actions/cache/restore@v4
        with:
          path: spark-apps/charts
          key: dep-charts-v2-${{ hashFiles('spark-apps/Chart.yaml') }}

      - name: Helm Dependency update
        if: ${{ steps.cache-charts.outputs.cache-hit != 'true' }}
        run: devbox run init-charts

      - name: Helm Template
        run: helm template spark-apps spark-apps/ --debug -f .github/ci/ci-values.yaml

      - name: Create Package
        run: helm package spark-apps/

  docs:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout to current commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Run helm-docs and push to the same branch
        uses: losisin/helm-docs-github-action@v1
        with:
          git-push: true
          git-push-user-name: "spark-apps Bot 🤖"
          git-push-user-email: "spark-apps-bot@datahub.local"
          chart-search-root: ./spark-apps
          template-files: README.md.gotmpl
