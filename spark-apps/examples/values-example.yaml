spark:
  pullSecrets:
    - regcred

serviceAccount:
  create: true
  name: spark

scripts:
  enabled: true
  mountPath: /opt/spark/scripts
  files:
    example_job.py: |
      from argparse import ArgumentParser

      from pyspark.sql import SparkSession


      def parse_args():
          parser = ArgumentParser()
          parser.add_argument("--message", default="hello")
          return parser.parse_args()


      def main():
          args = parse_args()
          spark = SparkSession.builder.appName("example-job").getOrCreate()
          df = spark.createDataFrame([(args.message,)], ["message"])
          df.show(truncate=False)
          spark.stop()


      if __name__ == "__main__":
          main()

sharedConfigMaps:
  - id: common-env
    name: spark-shared-config
    envFrom: true
    data:
      APP_ENV: dev
      SPARK_LOG_LEVEL: INFO

sharedSecrets:
  - id: api-token
    name: spark-shared-secret
    envFrom: true
    stringData:
      API_TOKEN: replace-me
  - id: tls-material
    name: spark-tls-secret
    mountPath: /opt/spark/certs
    stringData:
      ca.crt: replace-me

sparkApplications:
  - name: sample-wordcount
    type: Python
    mode: cluster
    mainApplicationFile: local:///opt/spark/scripts/example_job.py
    arguments:
      - "--message"
      - "hello from spark"
    restartPolicy:
      type: Never
    sharedConfigMapRefs:
      - common-env
    sharedSecretRefs:
      - api-token
    driver:
      cores: 1
      coreLimit: 1200m
      memory: 512m
    executor:
      instances: 1
      cores: 1
      memory: 512m
