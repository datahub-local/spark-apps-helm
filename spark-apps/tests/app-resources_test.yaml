suite: app resources template
templates:
  - templates/app-resources.yaml
tests:
  - it: renders shared configmaps and secrets once
    values:
      - fixtures/selection-values.yaml
    asserts:
      - hasDocuments:
          count: 4
        documentIndex: 0
      - equal:
          path: metadata.name
          value: spark-apps-common-env
        documentIndex: 0
      - equal:
          path: metadata.name
          value: spark-apps-tls-secret
        documentIndex: 3
