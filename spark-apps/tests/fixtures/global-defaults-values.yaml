spark:
  pullSecrets:
    - registry-prod

serviceAccount:
  create: true
  name: spark-runtime
  annotations:
    test-annotation: enabled
  labels:
    test-label: runtime

sharedConfigMaps:
  - id: runtime-config
    name: runtime-config
    envFrom: true
    data:
      APP_ENV: production

sparkApplications:
  - name: global-defaults
    type: Python
    mode: cluster
    mainApplicationFile: local:///opt/spark/app.py
    driver:
      cores: 1
      memory: 512m
      coreLimit: 1200m
    executor:
      instances: 1
      cores: 1
      memory: 512m
