suite: scripts configmap template
templates:
  - templates/scripts-configmap.yaml
tests:
  - it: prefixes a configured scripts configmap name
    set:
      scripts.enabled: true
      scripts.configMapName: bundled-scripts
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-bundled-scripts
