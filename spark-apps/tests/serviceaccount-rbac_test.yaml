suite: serviceaccount rbac template
templates:
  - templates/serviceaccount-rbac.yaml
tests:
  - it: renders the chart-level role and rolebinding when the service account is
      enabled
    values:
      - fixtures/global-defaults-values.yaml
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Role
        documentIndex: 0
      - equal:
          path: metadata.name
          value: spark-apps-spark-runtime-role
        documentIndex: 0
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
              - configmaps
              - persistentvolumeclaims
              - services
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete
              - deletecollection
        documentIndex: 0
      - isKind:
          of: RoleBinding
        documentIndex: 1
      - equal:
          path: metadata.name
          value: spark-apps-spark-runtime-binding
        documentIndex: 1
      - equal:
          path: subjects[0].name
          value: spark-apps-spark-runtime
        documentIndex: 1
      - equal:
          path: roleRef.name
          value: spark-apps-spark-runtime-role
        documentIndex: 1
  - it: does not render rbac objects when the service account is disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
