suite: serviceaccount template
templates:
  - templates/serviceaccount.yaml
tests:
  - it: renders the chart-level service account when enabled
    values:
      - fixtures/global-defaults-values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: spark-runtime
      - equal:
          path: metadata.labels.test-label
          value: runtime
      - equal:
          path: metadata.annotations.test-annotation
          value: enabled
