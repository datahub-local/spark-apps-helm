suite: sparkapplication template
templates:
  - templates/sparkapplication.yaml
tests:
  - it: attaches only selected shared resources and chart defaults
    values:
      - fixtures/selection-values.yaml
    asserts:
      - equal:
          path: spec.sparkVersion
          value: 4.1.1
      - equal:
          path: spec.image
          value: "apache/spark:4.1.1"
      - equal:
          path: spec.imagePullPolicy
          value: IfNotPresent
      - equal:
          path: spec.driver.serviceAccount
          value: chart-sa
      - contains:
          path: spec.imagePullSecrets
          content: regcred
      - contains:
          path: spec.driver.envFrom
          content:
            configMapRef:
              name: RELEASE-NAME-common-env
      - contains:
          path: spec.driver.envFrom
          content:
            secretRef:
              name: RELEASE-NAME-api-secret
      - notContains:
          path: spec.driver.volumeMounts
          content:
            name: shared-config-1
            mountPath: /opt/spark/conf/shared
            readOnly: true
      - notContains:
          path: spec.driver.volumeMounts
          content:
            name: shared-secret-1
            mountPath: /etc/tls
            readOnly: true
  - it: applies chart-level image pull secrets
    values:
      - fixtures/global-defaults-values.yaml
    asserts:
      - equal:
          path: spec.sparkVersion
          value: 4.1.1
      - equal:
          path: spec.image
          value: "apache/spark:4.1.1"
      - equal:
          path: spec.driver.serviceAccount
          value: RELEASE-NAME-spark-runtime
      - contains:
          path: spec.imagePullSecrets
          content: registry-prod
      - contains:
          path: spec.driver.envFrom
          content:
            configMapRef:
              name: RELEASE-NAME-runtime-config
  - it: renders suspend on a SparkApplication without a schedule
    values:
      - fixtures/suspended-values.yaml
    asserts:
      - isKind:
          of: SparkApplication
      - equal:
          path: spec.suspend
          value: true
  - it: renders a ScheduledSparkApplication when schedule is set
    values:
      - fixtures/scheduled-values.yaml
    asserts:
      - isKind:
          of: ScheduledSparkApplication
      - equal:
          path: metadata.name
          value: RELEASE-NAME-scheduled-app
      - equal:
          path: spec.schedule
          value: 0 * * * *
      - equal:
          path: spec.suspend
          value: true
      - equal:
          path: spec.timeZone
          value: UTC
      - equal:
          path: spec.concurrencyPolicy
          value: Forbid
      - equal:
          path: spec.successfulRunHistoryLimit
          value: 3
      - equal:
          path: spec.failedRunHistoryLimit
          value: 2
      - equal:
          path: spec.template.sparkVersion
          value: 4.1.1
      - equal:
          path: spec.template.image
          value: "apache/spark:4.1.1"
      - contains:
          path: spec.template.imagePullSecrets
          content: regcred
      - equal:
          path: spec.template.driver.serviceAccount
          value: chart-sa
      - contains:
          path: spec.template.volumes
          content:
            name: spark-scripts
            configMap:
              name: RELEASE-NAME-spark-apps-scripts
              defaultMode: 493
  - it: references the prefixed scripts configmap name
    values:
      - ../examples/values-example.yaml
    set:
      scripts.configMapName: bundled-scripts
    asserts:
      - contains:
          path: spec.volumes
          content:
            name: spark-scripts
            configMap:
              name: RELEASE-NAME-bundled-scripts
              defaultMode: 493
