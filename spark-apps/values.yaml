# Default values for spark-apps.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Spark Operator dependency configuration
# -- All values under sparkOperator are passed to the spark-operator Helm chart dependency.
# -- Configure the operator by adding values following the spark-operator chart's values.yaml structure.
sparkOperator:
  # -- Enable/disable spark-operator as a dependency
  enabled: false

spark:
  # -- Shared Spark version applied to every SparkApplication. Defaults to the chart appVersion when empty.
  sparkVersion: ""
  # -- Base image repository for Spark drivers and executors.
  image: apache/spark
  # -- Shared Spark image tag. Defaults to spark.sparkVersion and then chart appVersion when empty.
  tag: ""
  # -- Image pull secrets added to every SparkApplication spec.
  pullSecrets: []
  # -- Shared image pull policy for Spark drivers and executors.
  pullPolicy: IfNotPresent
# -- Additional labels to add to all resources created by this chart.
commonLabels: {}
# -- Additional annotations to add to all resources created by this chart.
commonAnnotations: {}

serviceAccount:
  # -- Create a chart-managed service account for Spark drivers.
  create: true
  # -- Suffix for the chart-managed service account name when create=true, or the exact existing service account name when create=false.
  name: spark
  # -- Annotations to add to the chart-managed service account.
  annotations: {}
  # -- Labels to add to the chart-managed service account.
  labels: {}
  rbac:
    # -- Create a namespace-scoped Role and RoleBinding for the chart-managed service account.
    create: true
    # -- Policy rules granted to the chart-managed Spark driver service account.
    rules:
      - apiGroups:
          - ""
        resources:
          - pods
          - configmaps
          - persistentvolumeclaims
          - services
        verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
          - deletecollection

scripts:
  # -- Bundle script files from scripts.files into a ConfigMap and mount them into driver and executor pods.
  enabled: false
  # -- Suffix for the chart-managed scripts ConfigMap name when enabled. Leave empty to use the chart-generated default.
  configMapName: ""
  # -- Map of file names to script contents bundled into the chart-managed scripts ConfigMap when enabled.
  files: {}
  # -- Mount path for the bundled scripts inside Spark pods.
  mountPath: /opt/spark/scripts
  # -- File mode used for the scripts ConfigMap volume.
  defaultMode: 493

# -- Shared ConfigMaps rendered once per release and optionally attached to SparkApplications as envFrom sources or mounted volumes.
sharedConfigMaps: []
# -- Shared Secrets rendered once per release and optionally attached to SparkApplications as envFrom sources or mounted volumes.
sharedSecrets: []

# -- List of SparkApplication resources to render. Set sparkApplications[].schedule to render a ScheduledSparkApplication, and sparkApplications[].suspend to suspend either the application itself or subsequent scheduled runs. Read https://github.com/kubeflow/spark-operator/blob/master/docs/api-docs.md#sparkapplication for all supported parameters.
sparkApplications: []

